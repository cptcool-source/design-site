<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Outfit:ital,wght@0,300;0,400;0,800;1,300&family=Geist+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Fixed canvas — screenshot this at 1200×630 full page size */
  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #111111;
    -webkit-font-smoothing: antialiased;
  }

  .canvas {
    position: relative;
    width: 1200px;
    height: 630px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 96px;
  }

  /* Coral ambient glow — top right */
  .glow {
    position: absolute;
    width: 560px; height: 560px;
    background: radial-gradient(circle, rgba(224,92,58,0.17) 0%, transparent 68%);
    filter: blur(90px);
    right: -60px; top: -80px;
    pointer-events: none;
  }

  /* fT mark — top right */
  .mark {
    position: absolute;
    top: 52px;
    right: 96px;
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 800;
    font-size: 30px;
    letter-spacing: -0.05em;
    line-height: 1;
  }
  .mark-f { color: #F5F3EE; }
  .mark-t { color: #E05C3A; }

  /* Bottom domain */
  .domain {
    position: absolute;
    bottom: 52px;
    right: 96px;
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(245,243,238,0.22);
  }

  /* Thin vertical rule — left accent */
  .v-rule {
    position: absolute;
    left: 96px;
    top: 0; bottom: 0;
    width: 1px;
    background: linear-gradient(to bottom, transparent, rgba(224,92,58,0.35) 30%, rgba(224,92,58,0.35) 70%, transparent);
  }

  /* Content */
  .eyebrow {
    font-family: 'Geist Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #E05C3A;
    opacity: 0.75;
    margin-bottom: 32px;
    padding-left: 20px;
  }

  .wordmark {
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 800;
    font-size: 108px;
    line-height: 0.94;
    letter-spacing: -0.04em;
    color: #F5F3EE;
    margin-bottom: 6px;
    padding-left: 20px;
  }
  .wordmark-sub {
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 72px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: #E05C3A;
    margin-bottom: 28px;
    padding-left: 20px;
  }

  .rule {
    width: 56px;
    height: 2px;
    background: rgba(224,92,58,0.55);
    margin: 0 0 28px 20px;
  }

  .tagline {
    font-family: 'Outfit', system-ui, sans-serif;
    font-weight: 300;
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.01em;
    color: rgba(245,243,238,0.36);
    padding-left: 20px;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="glow"></div>
    <div class="v-rule"></div>

    <div class="mark"><span class="mark-f">c</span><span class="mark-t">d</span></div>
    <p class="domain">chuckdesign.com</p>

    <p class="eyebrow">Web Design &nbsp;·&nbsp; North Port, FL &nbsp;·&nbsp; Southwest Florida</p>
    <h1 class="wordmark">chuck</h1>
    <p class="wordmark-sub">design</p>
    <div class="rule"></div>
    <p class="tagline">Designs made to lead.</p>
  </div>
</body>
</html>
